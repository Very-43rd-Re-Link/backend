spring:
  application:
    name: relink
  config:
    import: optional:classpath:./secret/.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/relink?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USER_NAME:root}
    password: ${DB_PASSWORD:1234}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop # none, create, create-drop, update, validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

springdoc:
  server-url: http://localhost:8080
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

jwt:
  secret: relink-local-development-secret-key-should-be-changed
  access-token-expiration-seconds: 3600

cors:
  allowed:
    paths: "/**"
    origins:
      - http://localhost:3000
      - http://localhost:5173
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    headers:
      - "*"
    exposed-headers:
      - Set-Cookie
      - Authorization
    max-age: 3600
    credentials: true

social:
  kakao:
    user-info-uri: https://kapi.kakao.com/v2/user/me
  google:
    client-ids:
      web: ${GOOGLE_CLIENT_ID_WEB}
      android: ${GOOGLE_CLIENT_ID_ANDROID}
      ios: ${GOOGLE_CLIENT_ID_IOS}
