spring:
  application:
    name: relink

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/relink?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ssafy
    password: ssafy

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update # none, create, create-drop, update, validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

springdoc:
  server-url: http://localhost:8080
  swagger-ui:
    path: /swagger-ui.html
    enabled: true